name: Build & Deploy Storybook

on:
  pull_request:
    branches: [develop]
    paths: ["src/components/atoms/**"]

jobs:
  storybook:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.17.1

      - name: Install dependencies
        run: pnpm install

      - name: Clean Storybook build
        run: rm -rf storybook-static

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Publish to Chromatic
        id: chromatic
        run: |
          # Chromatic에 배포하고 URL 받기
          URL=$(pnpm exec chromatic --project-token=$CHROMATIC_PROJECT_TOKEN)
          echo "storybookUrl=$URL" >> $GITHUB_OUTPUT

      - name: Comment PR with Storybook URL
        uses: thollander/actions-comment-pull-request@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          message: "🚀 Storybook Preview: ${{ steps.chromatic.outputs.storybookUrl }}"
